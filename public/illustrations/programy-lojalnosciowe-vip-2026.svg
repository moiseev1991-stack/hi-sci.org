<svg viewBox="0 0 320 180" width="320" height="180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b3d3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2d26;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="badgeGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255, 215, 0, 1);" />
      <stop offset="100%" style="stop-color:rgba(255, 215, 0, 0.1);" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="320" height="180" fill="url(#bgGradient)" />
  <circle cx="160" cy="90" r="50" fill="url(#badgeGradient)" />
  <circle cx="160" cy="90" r="40" fill="none" stroke="rgba(255, 255, 255, 0.5)" stroke-width="3" />
  <g fill="rgba(255, 255, 255, 0.2)">
    <circle cx="20" cy="20" r="3" />
    <circle cx="300" cy="20" r="3" />
    <circle cx="20" cy="160" r="3" />
    <circle cx="300" cy="160" r="3" />
  </g>
  <g stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" stroke-linecap="round">
    <line x1="80" y1="170" x2="240" y2="170" />
    <line x1="80" y1="175" x2="240" y2="175" />
  </g>
</svg>